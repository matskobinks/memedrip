<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The background MUST be transparent for the Tauri window transparency to show through -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: transparent !important;
        overflow: hidden;
        pointer-events: none; /* CSS-level click-through as a belt-and-suspenders measure */
        user-select: none;
      }
    </style>
    <title>MemeDrip</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
