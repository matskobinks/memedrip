# ============================================================
# MemeDrip — Docker Compose (backend services)
# Single container runs Discord bot + WebSocket relay in-process.
# ============================================================
services:
  memedrip-bot:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    container_name: memedrip-bot
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${WS_PORT:-7878}:${WS_PORT:-7878}"
      - "${HEALTH_PORT:-7879}:${HEALTH_PORT:-7879}"
    volumes:
      # Optional: mount a media directory for /drop random
      - media-data:/data/media:ro
      # Optional: mount TLS certs for WSS
      # - ./certs:/certs:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      # #10 — Real health check: queries the HTTP health endpoint
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7879/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  media-data:
