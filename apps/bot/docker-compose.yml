# ============================================================
# MemeDrip — Docker Compose (backend services)
# Single container runs Discord bot + WebSocket relay in-process.
# ============================================================
services:
  memedrip-bot:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    container_name: memedrip-bot
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${WS_PORT:-7878}:${WS_PORT:-7878}"
    environment:
      - NODE_ENV=production
    healthcheck:
      # The bot process is healthy as long as node is alive
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
