<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemeDrip Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      #overlay-root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .media {
        max-width: min(90vw, 1400px);
        max-height: min(90vh, 900px);
        border-radius: 18px;
        object-fit: contain;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="overlay-root"></div>
    <script type="module" src="/src/overlay.ts"></script>
  </body>
</html>
